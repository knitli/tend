name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check (fmt, clippy, deny, svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: check-${{ runner.os }}-

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Stub CLI sidecar for Tauri build.rs
        run: |
          mkdir -p target/release
          touch target/release/tend-x86_64-unknown-linux-gnu
          chmod +x target/release/tend-x86_64-unknown-linux-gnu

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo deny
        run: cargo deny check bans

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: svelte-check
        run: pnpm check

  test:
    name: Test (cargo test, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Stub CLI sidecar for Tauri build.rs
        run: |
          mkdir -p target/release
          touch target/release/tend-x86_64-unknown-linux-gnu
          chmod +x target/release/tend-x86_64-unknown-linux-gnu

      - name: cargo test
        run: cargo test --workspace

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: vitest
        run: pnpm test

  build-linux:
    name: Build Linux packages
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-${{ runner.os }}-

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles (includes CLI sidecar via beforeBuildCommand)
        run: pnpm tauri build

      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: tend-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload rpm
        uses: actions/upload-artifact@v7
        with:
          name: tend-rpm
          path: target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: tend-appimage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog for this release
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/tend-deb/*.deb
            artifacts/tend-rpm/*.rpm
            artifacts/tend-appimage/*.AppImage
