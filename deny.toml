# cargo-deny configuration.
#
# T009b: Build-time enforcement of FR-022 (local-only scope). Any networking
# stack that sneaks into the dep graph fails the build. This is the PRIMARY
# gate against v1 growing accidental network I/O; T149's grep is belt-and-
# braces on top of this.
#
# Exceptions MUST be behind an explicit `[features]` flag with a comment
# referencing a future v2 feature. Edit this file; do NOT add per-package
# allows elsewhere.

[graph]
all-features = false
# FR-022 is enforced **per-target** against the platform we actually build
# for. v1 ships Linux primary (per plan.md Technical Context); macOS and
# Windows are Tauri-by-product and not in v1 CI. Tauri 2's Linux build does
# NOT pull reqwest or any networking stack; its macOS build does (for the
# updater subsystem we're not using). When we add macOS/Windows triples to
# CI, we add them here, and any macOS-specific networking the Tauri runtime
# drags in will need to be audited and either excluded via features or
# explicitly allowed with a rationale.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace path deps use `{ workspace = true }` and have no version
# field — cargo-deny 0.14+ treats that as a wildcard by default. This flag
# exempts path-based workspace deps (our `tend-protocol` path dep) while
# keeping real `"*"` wildcards banned in our external crates.
allow-wildcard-paths = true

# FR-022: local-only. No network stacks. sqlx is pulled in with rustls for
# TLS-less sqlite, not because we use TLS — sqlx forces a TLS backend choice
# even for sqlite-only feature sets. No actual network code path exists.
deny = [
    { name = "reqwest" },
    { name = "hyper" },
    { name = "isahc" },
    { name = "ureq" },
    { name = "surf" },
    { name = "tonic" },
    { name = "curl" },
    { name = "curl-sys" },
    { name = "tungstenite" },
    { name = "tokio-tungstenite" },
    { name = "native-tls" },
    { name = "rustls-native-certs" },
    { name = "openssl-sys" },
]

[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "warn"
unknown-git = "warn"
